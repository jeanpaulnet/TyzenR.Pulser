
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulser AI | AI Market Sentiment Intelligence</title>
  <meta name="description" content="Daily scanning of market news for stocks, crypto, and indices sentiment trends.">
  <link rel="canonical" href="https://futurecaps.buzz/" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0f172a;
      color: #f8fafc;
      overflow-x: hidden;
    }
    /* Smooth scrolling for dashboard */
    html {
      scroll-behavior: smooth;
    }
    /* Hide scrollbars but keep functionality */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* Elegant custom horizontal and vertical scrollbar for dialog grid list */
    .fancy-scrollbar::-webkit-scrollbar {
      height: 6px;
      width: 6px;
    }
    .fancy-scrollbar::-webkit-scrollbar-track {
      background: rgba(15, 23, 42, 0.4);
      border-radius: 9999px;
    }
    .fancy-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(59, 130, 246, 0.4);
      border-radius: 9999px;
    }
    .fancy-scrollbar::-webkit-scrollbar-thumb:hover {
      background: rgba(59, 130, 246, 0.65);
    }
    .fancy-scrollbar {
      scrollbar-width: thin;
      scrollbar-color: rgba(59, 130, 246, 0.4) rgba(15, 23, 42, 0.4);
    }
  </style>
</head>
<body>
  <div id="root">
    <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; color: #94a3b8;">
      Loading Pulser Intelligence...
    </div>
  </div>
  <script type="module" src="./index.tsx"></script>
</body>
</html>
